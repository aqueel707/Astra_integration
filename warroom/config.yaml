# ASTRA Global Configuration

app:
  name: "ASTRA"
  version: "0.1.0"
  description: "AI-driven cybersecurity training simulator"

server:
  api_host: "0.0.0.0"
  api_port: 8000
  dashboard_port: 8050
  reload: true  # Auto-reload on code changes (dev only)

database:
  url: "sqlite+aiosqlite:///./astra.db"
  echo: false  # Set true to see SQL queries in console

redis:
  url: "redis://localhost:6379/0"
  enabled: false  # Set true once Redis is installed

simulation:
  default_difficulty: "medium"
  log_stream_interval_ms: 500  # How fast logs stream to dashboard
  noise_ratio: 0.6  # 60% of logs are benign noise
  max_session_duration_minutes: 60

scoring:
  weights:
    detection_rate: 0.30
    mean_time_to_detect: 0.25
    false_positive_rate: 0.15
    containment_speed: 0.15
    report_quality: 0.15

mitre:
  attack_version: "15.1"
  matrix: "enterprise"

reports:
  output_dir: "reports/output"
  templates_dir: "reports/templates"
