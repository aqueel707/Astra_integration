# data/log_templates/windows_attack.yml
#
# Log templates for every Windows-sourced MITRE technique implemented in Block 2.
# Each entry defines:
#   technique_id : MITRE ID this template handles
#   logs         : list of log blueprints the generator expands into LogEntry objects
#
# Template variables (resolved by generator.py at render time):
#   {source_host}   - attacker / pivot host
#   {target_host}   - victim host
#   {username}      - account used
#   {source_ip}     - source IP address
#   {target_ip}     - destination IP address
#   {command_line}  - command executed
#   {process_name}  - process name
#   {parent_process}- parent process name
#   {service}       - service / protocol name
#   {task_name}     - scheduled task name
#   {registry_key}  - registry key path
#   {file_path}     - file path
#   {port}          - network port
#   {payload}       - payload name / description
#   {hash}          - NTLM hash (truncated)
#   {ticket_type}   - Kerberos ticket type
#   {bytes}         - data size in bytes
#   {c2_domain}     - C2 / exfil domain
#   {family}        - ransomware family name
#   {ext}           - ransomware file extension
#   {count}         - numeric count
#   {package}       - software package name
#   {cve}           - CVE identifier

# ─── T1595.001 Active Scanning ────────────────────────────────────────────────
- technique_id: "T1595.001"
  logs:
    - source: windows_event
      event_id: 5156
      category: network
      severity: info
      message: "The Windows Filtering Platform permitted a connection. Application: System. Direction: Inbound. Source IP: {source_ip}. Destination Port: {port}."
      fields:
        source_ip: "{source_ip}"
        destination_port: "{port}"
        process_name: "System"
        raw_data:
          direction: Inbound
          protocol: TCP
          filter_id: 68288

    - source: windows_event
      event_id: 5157
      category: network
      severity: info
      message: "The Windows Filtering Platform blocked a connection. Application: System. Direction: Inbound. Source IP: {source_ip}. Destination Port: {port}."
      fields:
        source_ip: "{source_ip}"
        destination_port: "{port}"
        process_name: "System"
        raw_data:
          direction: Inbound
          protocol: TCP

# ─── T1595.002 Vulnerability Scanning ────────────────────────────────────────
- technique_id: "T1595.002"
  logs:
    - source: windows_event
      event_id: 5156
      category: network
      severity: info
      message: "Repeated inbound connection attempts from {source_ip} targeting port {port}. Possible vulnerability scan detected."
      fields:
        source_ip: "{source_ip}"
        destination_port: "{port}"
        process_name: "System"
        raw_data:
          scan_type: vulnerability

# ─── T1566.001 Spearphishing Attachment ──────────────────────────────────────
- technique_id: "T1566.001"
  logs:
    - source: windows_event
      event_id: 4688
      category: process_creation
      severity: medium
      message: "A new process was created. Creator: {username}. New Process: WINWORD.EXE. Command: WINWORD.EXE /n {payload}"
      fields:
        hostname: "{target_host}"
        username: "{username}"
        process_name: "WINWORD.EXE"
        parent_process: "explorer.exe"
        command_line: "WINWORD.EXE /n {payload}"
        raw_data:
          new_process_id: 4928
          token_elevation_type: "TokenElevationTypeDefault (1)"

    - source: windows_event
      event_id: 4688
      category: process_creation
      severity: high
      message: "Macro spawned child process. Creator: WINWORD.EXE. New Process: cmd.exe. Command: cmd.exe /c powershell -enc {payload}"
      fields:
        hostname: "{target_host}"
        username: "{username}"
        process_name: "cmd.exe"
        parent_process: "WINWORD.EXE"
        command_line: "cmd.exe /c powershell -enc {payload}"
        raw_data:
          subject_user: "{username}"
          token_elevation_type: "TokenElevationTypeFull (3)"

    - source: endpoint_edr
      event_id: 1
      category: process_creation
      severity: high
      message: "Sysmon: Office macro spawned shell. Image: cmd.exe. ParentImage: WINWORD.EXE. User: {username}@{target_host}."
      fields:
        hostname: "{target_host}"
        username: "{username}"
        process_name: "cmd.exe"
        parent_process: "WINWORD.EXE"
        command_line: "cmd.exe /c powershell -enc {payload}"
        raw_data:
          RuleName: "TechniqueID=T1566.001,TechniqueName=Phishing"
          EventType: ProcessCreate

# ─── T1190 Exploit Public-Facing Application ──────────────────────────────────
- technique_id: "T1190"
  logs:
    - source: windows_event
      event_id: 4688
      category: process_creation
      severity: critical
      message: "Unusual child process spawned from web service. Process: cmd.exe. Parent: w3wp.exe. Command: cmd.exe /c whoami."
      fields:
        hostname: "{target_host}"
        username: "NETWORK SERVICE"
        process_name: "cmd.exe"
        parent_process: "w3wp.exe"
        command_line: "cmd.exe /c whoami"
        raw_data:
          cve: "{cve}"
          exploit_type: "RCE"

    - source: endpoint_edr
      event_id: 3
      category: network
      severity: critical
      message: "Sysmon: Network connection initiated by w3wp.exe to external host {target_ip}:{port}. Possible reverse shell."
      fields:
        hostname: "{target_host}"
