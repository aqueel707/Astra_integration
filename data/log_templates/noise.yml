# data/log_templates/noise.yml
# Benign background log entries — realistic corporate traffic.
# The noise generator picks from these weighted by category.

windows:
  - weight: 30
    template:
      source: windows_event
      event_id: 4624
      category: authentication
      severity: info
      message: "An account was successfully logged on. Account: {username}. Logon Type: 2 (Interactive). Host: {hostname}."
      fields:
        raw_data:
          LogonType: 2
          AuthPackage: Kerberos
          WorkstationName: "{hostname}"

  - weight: 20
    template:
      source: windows_event
      event_id: 4634
      category: authentication
      severity: info
      message: "An account was logged off. Account: {username}. Logon Type: 2."
      fields:
        raw_data:
          LogonType: 2

  - weight: 25
    template:
      source: windows_event
      event_id: 4688
      category: process_creation
      severity: info
      message: "New process: {process_name} created by {username}."
      fields:
        raw_data:
          TokenElevationType: "TokenElevationTypeDefault (1)"

  - weight: 10
    template:
      source: windows_event
      event_id: 7040
      category: service
      severity: info
      message: "The start type of the {service} service was changed from auto start to demand start."
      fields:
        raw_data:
          param1: "{service}"
          param2: "auto start"
          param3: "demand start"

  - weight: 8
    template:
      source: windows_event
      event_id: 1074
      category: service
      severity: info
      message: "The process {process_name} has initiated the shutdown of computer {hostname} on behalf of user {username}."
      fields:
        raw_data:
          param1: "{process_name}"
          param5: "{username}"
          param6: "{hostname}"

  - weight: 7
    template:
      source: windows_event
      event_id: 4648
      category: authentication
      severity: info
      message: "Logon with explicit credentials. Account: {username}. Target Server: update.microsoft.com."
      fields:
        destination_ip: "20.112.52.29"
        raw_data:
          TargetServer: "update.microsoft.com"
          LogonType: 3

linux:
  - weight: 35
    template:
      source: linux_syslog
      event_id: null
      category: authentication
      severity: info
      message: "sshd[{pid}]: Accepted publickey for {username} from {source_ip} port {port} ssh2"
      fields:
        process_name: sshd
        raw_data:
          facility: auth
          tag: sshd

  - weight: 20
    template:
      source: linux_syslog
      event_id: null
      category: service
      severity: info
      message: "systemd[1]: Started {service}.service."
      fields:
        process_name: systemd
        raw_data:
          facility: daemon
          tag: systemd
          pid: 1

  - weight: 15
    template:
      source: linux_syslog
      event_id: null
      category: scheduled_task
      severity: info
      message: "cron[{pid}]: ({username}) CMD (/usr/bin/logrotate /etc/logrotate.conf)"
      fields:
        process_name: cron
        raw_data:
          facility: cron
          tag: cron

  - weight: 20
    template:
      source: linux_syslog
      event_id: null
      category: authentication
      severity: notice
      message: "sshd[{pid}]: Disconnected from authenticating user {username} {source_ip} port {port}"
      fields:
        process_name: sshd
        raw_data:
          facility: auth
          tag: sshd

  - weight: 10
    template:
      source: linux_syslog
      event_id: null
      category: service
      severity: info
      message: "kernel: eth0: renamed from veth{hex}"
      fields:
        process_name: kernel
        raw_data:
          facility: kern
          tag: kernel
          pid: null

network:
  - weight: 40
    template:
      source: network_flow
      event_id: null
      category: network
      severity: info
      message: "ALLOW TCP {source_ip}:{src_port} → {destination_ip}:443 [{bytes} bytes]"
      fields:
        destination_port: 443
        raw_data:
          protocol: TCP
          action: ALLOW
          bytes_out: "{bytes}"
          bytes_in: 2048

  - weight: 20
    template:
      source: network_flow
      event_id: null
      category: network
      severity: info
      message: "ALLOW UDP {source_ip}:53 → {destination_ip}:53 [{bytes} bytes]"
      fields:
        destination_port: 53
        raw_data:
          protocol: UDP
          action: ALLOW
          bytes_out: 64
          bytes_in: 128

  - weight: 30
    template:
      source: network_flow
      event_id: null
      category: network
      severity: info
      message: "ALLOW TCP {source_ip}:{src_port} → {destination_ip}:80 [{bytes} bytes]"
      fields:
        destination_port: 80
        raw_data:
          protocol: TCP
          action: ALLOW
          bytes_out: "{bytes}"
          bytes_in: 4096

  - weight: 10
    template:
      source: network_flow
      event_id: null
      category: network
      severity: info
      message: "DENY TCP {source_ip}:{src_port} → {destination_ip}:{dst_port} [Firewall policy]"
      fields:
        raw_data:
          protocol: TCP
          action: DENY
          reason: "No matching rule"
